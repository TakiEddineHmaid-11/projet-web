<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CineMax</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="./login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🎬 CineMax</h1>
                <h2>Sign In</h2>
                <p class="subtitle">Access your cinema account</p>
            </div>

            <div class="error" id="error"></div>
            <div class="success" id="success"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="login-footer">
                <p>Demo credentials: username: <strong>admin</strong> | password: <strong>admin</strong></p>
                <p><a href="../index.html" class="back-link">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="./login.js"></script>
</body>
</html>
